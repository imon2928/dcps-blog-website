<style>

*{box-sizing:border-box; margin:0; padding:0;}
body{background:var(--paper); color:var(--ink); font-family:'Hind Siliguri','Inter',sans-serif; min-height:100vh;}
.ruled-top{height:8px; background:repeating-linear-gradient(90deg,var(--forest) 0 22px,transparent 0 28px); opacity:.85;}

header{background:var(--forest); color:var(--mint); padding:16px 6vw; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; border-bottom:3px solid var(--forest-deep);}
.brand{display:flex; align-items:center; gap:10px; text-decoration:none;}
.brand img{width:44px; height:44px;}
.brand-text .site-name{font-family:'Tiro Bangla',serif; font-size:1.1rem; color:#fff;}
.brand-text .sub{font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:var(--sage-soft);}
.nav-actions{display:flex; gap:10px;}
.nav-btn{color:var(--mint); text-decoration:none; font-size:.84rem; font-weight:600; display:flex; align-items:center; gap:5px; border:1px solid rgba(255,255,255,.25); padding:7px 16px; border-radius:20px; cursor:pointer; background:transparent; transition:.2s;}
.nav-btn:hover{background:rgba(255,255,255,.1);}

/* article hero */
.article-hero{background:var(--forest-deep); padding:52px 6vw 44px; color:#fff;}
.article-hero-inner{max-width:780px; margin:0 auto;}
.breadcrumb{font-size:.74rem; color:var(--sage-soft); margin-bottom:16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.breadcrumb a{color:var(--sage-soft); text-decoration:none;}
.breadcrumb a:hover{color:#fff;}
.content-type-badge{display:inline-block; padding:5px 14px; border-radius:20px; font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:18px;}
.badge-neuro{background:#2D6A4F; color:#B7E4C7;}
.badge-psychological{background:#5C3317; color:#F4C097;}
.badge-dsm5{background:#1A3A2A; color:#AEC9A8; border:1px solid #3A6B50;}
.article-title{font-family:'Tiro Bangla',serif; font-size:clamp(1.6rem,3vw,2.4rem); line-height:1.3; margin-bottom:18px; color:#fff;}
.article-meta{display:flex; align-items:center; gap:20px; font-size:.8rem; color:var(--sage-soft); flex-wrap:wrap;}
.meta-item{display:flex; align-items:center; gap:5px;}

/* content area */
.article-wrap{max-width:780px; margin:0 auto; padding:52px 6vw 90px;}

/* loading state */
.loading{text-align:center; padding:80px 20px;}
.loading-spinner{width:44px; height:44px; border:3px solid var(--paper-line); border-top-color:var(--forest); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{color:var(--ink-soft); font-size:.95rem; margin-top:10px;}
.loading .hint{font-size:.8rem; color:var(--sage); margin-top:8px;}

/* error state */
.error-box{background:#fff; border:1px solid #f0c4b8; border-radius:4px; padding:24px; color:#8B3A20;}

/* rendered article content */
#article-content{display:none;}
#article-content h2{
  font-family:'Tiro Bangla',serif; font-size:1.45rem; color:var(--forest-deep);
  margin:36px 0 16px; padding-bottom:10px; border-bottom:1.5px solid var(--paper-line);
}
#article-content h3{
  font-family:'Tiro Bangla',serif; font-size:1.15rem; color:var(--forest);
  margin:28px 0 12px;
}
#article-content p{

}
#article-content ul, #article-content ol{
  padding-left:22px; margin:0 0 18px;
}
#article-content li{
  font-size:1rem; line-height:1.75; color:var(--ink); margin-bottom:6px;

#article-content strong{color:var(--forest-deep); font-weight:700;}
#article-content em{color:var(--coral);}
#article-content blockquote{

}
#article-content .dsm-criteria{

}
#article-content .dsm-criteria h4{

  margin:0 0 12px; padding-bottom:8px; border-bottom:1px dashed var(--paper-line);
}
#article-content .dsm-criteria p{font-size:.92rem; margin-bottom:10px;}
#article-content .tag-row{display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 20px;}
#article-content .tag{

#article-content hr{border:none; border-top:1px dashed var(--paper-line); margin:30px 0;}

/* related section */
.related{background:#fff; border-top:1px solid var(--paper-line); padding:40px 6vw;}

.related-card .rc-title{font-family:'Tiro Bangla',serif; font-size:.92rem; color:var(--forest-deep); line-height:1.4;}

// Build the prompt for Claude
function buildPrompt(){
  const prompts = {
    neuro: `তুমি একজন বিশেষজ্ঞ মনোবিজ্ঞানী ও স্নায়ুবিজ্ঞানী।

আর্টিকেলে অবশ্যই থাকবে:
1. সংক্ষিপ্ত ভূমিকা (এই ডিসঅর্ডার কী এবং স্নায়ুতন্ত্রের সাথে এর সম্পর্ক)
2. মস্তিষ্কের কোন কোন অংশ প্রভাবিত হয় (নিউরোঅ্যানাটমি)
3. নিউরোট্রান্সমিটারের ভূমিকা (যেমন: ডোপামিন, সেরোটোনিন, GABA ইত্যাদি যেগুলো প্রযোজ্য)
4. জেনেটিক ও বংশগত কারণ
5. নিউরোডেভেলপমেন্টাল কারণ
6. ইমেজিং গবেষণার ফলাফল (fMRI, EEG, PET scan সংক্রান্ত গবেষণা)
7. DSM-5 এবং আধুনিক গবেষণার আলোকে গুরুত্বপূর্ণ তথ্য

HTML ফরম্যাটে লেখো। শুধু <h2>, <h3>, <p>, <ul>, <li>, <strong>, <em>, <blockquote> ট্যাগ ব্যবহার করো। বাংলায় লেখো, প্রয়োজনে ইংরেজি টার্ম বন্ধনীতে দাও। আর্টিকেলটি কমপক্ষে ৬০০ শব্দের হতে হবে।`,

    psychological: `তুমি একজন বিশেষজ্ঞ ক্লিনিকাল মনোবিজ্ঞানী।

"${disorderBn}" ডিসঅর্ডারের **সাইকোলজিকাল কারণ** নিয়ে বাংলায় একটি বিস্তারিত আর্টিকেল লেখো।

আর্টিকেলে অবশ্যই থাকবে:

5. মাত্রা ও তীব্রতা (Severity Levels)

8. নির্ণয়ে ব্যবহৃত মূল্যায়ন পদ্ধতি

HTML ফরম্যাটে লেখো। শুধু <h2>, <h3>, <p>, <ul>, <li>, <strong>, <em>, <blockquote> ট্যাগ ব্যবহার করো। বাংলায় লেখো, প্রয়োজনে ইংরেজি টার্ম বন্ধনীতে দাও। কমপক্ষে ৭০০ শব্দ।`
  };
  return prompts[contentType] || prompts.neuro;
}

async function generateContent(){
  document.getElementById('loading-state').style.display='block';
  document.getElementById('error-state').style.display='none';
  document.getElementById('article-content').style.display='none';

  const loadingMsgs = [
    'DSM-5 তথ্যভান্ডার থেকে তথ্য সংগ্রহ করা হচ্ছে...',
    'বাংলায় কন্টেন্ট তৈরি হচ্ছে...',
    'আর্টিকেল সাজানো হচ্ছে...',
    'প্রায় হয়ে গেছে...',
  ];
  let msgIdx=0;
  const msgEl = document.getElementById('loading-msg');
  const msgTimer = setInterval(()=>{ msgEl.textContent = loadingMsgs[Math.min(++msgIdx,loadingMsgs.length-1)]; }, 4000);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:2000,
        system: 'তুমি ঢাকা কলেজ সাইকোলজি সোসাইটির একজন বিশেষজ্ঞ লেখক। তুমি সবসময় বাংলায় লেখো। শুধুমাত্র HTML কন্টেন্ট দাও, কোনো মার্কডাউন বা ```html ব্লক ব্যবহার করো না। সরাসরি <h2> দিয়ে শুরু করো।',
        messages:[{role:'user', content: buildPrompt()}]
      })
    });
    clearInterval(msgTimer);
    if(!resp.ok) throw new Error('API error: ' + resp.status);
    const data = await resp.json();
    const html = data.content?.[0]?.text || '';
    if(!html.trim()) throw new Error('Empty response');

    document.getElementById('article-content').innerHTML = html;
    document.getElementById('article-content').style.display='block';
    document.getElementById('loading-state').style.display='none';
    buildRelated();
  } catch(err){
    clearInterval(msgTimer);
    console.error(err);
    document.getElementById('loading-state').style.display='none';
    document.getElementById('error-state').style.display='block';
  }
}

generateContent();
</script>
